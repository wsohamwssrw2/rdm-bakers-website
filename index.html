<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PREARN  • AURA MATTERS </title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap');

        :root {
            --accent: #ff2d55;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system_ui, sans-serif;
            background: #0a0a0a;
            color: #fff;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* LANDING PAGE */
        #landing {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .background-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(255, 45, 85, 0.08) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(255, 45, 85, 0.08) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 1;
            opacity: 0.6;
        }

        .landing-content {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 520px;
            padding: 0 20px;
        }

        .card {
            background: rgba(20, 20, 20, 0.75);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 28px;
            padding: 48px 40px;
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.4),
                0 0 0 1px rgba(255, 45, 85, 0.15) inset;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 24px;
        }

        .logo-dot {
            width: 28px;
            height: 28px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 25px var(--accent);
            animation: glow 2s ease-in-out infinite alternate;
        }

        .logo-text {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -1px;
        }

        .tagline {
            text-align: center;
            font-size: 15px;
            color: #aaa;
            margin-bottom: 32px;
            letter-spacing: 0.5px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #ddd;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-wrapper {
            position: relative;
        }

        input {
            width: 100%;
            background: rgba(255,255,255,0.08);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 18px 24px;
            font-size: 18px;
            color: #fff;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(255, 45, 85, 0.25);
            transform: translateY(-1px);
        }

        input::placeholder {
            color: #777;
        }

        .room-row {
            display: flex;
            gap: 12px;
        }

        .generate-btn {
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.2);
            color: #fff;
            width: 58px;
            height: 58px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .generate-btn:hover {
            background: var(--accent);
            transform: rotate(180deg);
        }

        .join-btn {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 9999px;
            padding: 20px;
            font-size: 20px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 
                0 10px 30px -8px var(--accent),
                0 0 25px 2px rgba(255, 45, 85, 0.5);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .join-btn:hover {
            transform: translateY(-3px) scale(1.04);
            box-shadow: 
                0 20px 40px -10px var(--accent),
                0 0 35px 8px rgba(255, 45, 85, 0.6);
        }

        .join-btn:active {
            transform: scale(0.98);
        }

        .demo-rooms {
            margin-top: 32px;
            text-align: center;
        }

        .demo-title {
            font-size: 13px;
            color: #666;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .demo-badges {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .demo-badge {
            background: rgba(255,255,255,0.08);
            color: #ddd;
            padding: 6px 16px;
            border-radius: 9999px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .demo-badge:hover {
            background: var(--accent);
            color: white;
            transform: scale(1.05);
        }

        /* MEETING PAGE */
        #meeting {
            display: none;
            flex-direction: column;
            height: 100vh;
            background: #000;
            position: relative;
        }

        .meeting-header {
            height: 68px;
            background: rgba(15, 15, 15, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            padding: 0 24px;
            z-index: 100;
            gap: 16px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .meeting-dot {
            width: 10px;
            height: 10px;
            background: #22c55e;
            border-radius: 50%;
            box-shadow: 0 0 12px #22c55e;
            animation: pulse 2s infinite;
        }

        .room-title {
            font-weight: 600;
            font-size: 18px;
            letter-spacing: -0.5px;
        }

        .header-center {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            font-size: 15px;
            color: #888;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .leave-btn {
            background: #ff2d55;
            color: white;
            border: none;
            padding: 10px 28px;
            border-radius: 9999px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 0 20px rgba(255, 45, 85, 0.5);
            transition: all 0.3s ease;
        }

        .leave-btn:hover {
            background: #ff4d6f;
            transform: scale(1.05);
        }

        .iframe-wrapper {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        #jitsi-iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #000;
        }

        /* OVERLAY CONTROLS */
        .meeting-overlay {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(12px);
            padding: 8px 16px;
            border-radius: 9999px;
            font-size: 14px;
            display: none;
            align-items: center;
            gap: 8px;
            z-index: 200;
            color: #ddd;
        }

        /* ANIMATIONS */
        .fade-in {
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes glow {
            from { box-shadow: 0 0 15px var(--accent); }
            to { box-shadow: 0 0 35px var(--accent); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* RESPONSIVE */
        @media (max-width: 640px) {
            .card {
                padding: 36px 24px;
                border-radius: 24px;
            }
            .meeting-header {
                height: 60px;
                padding: 0 16px;
            }
            input {
                padding: 16px 20px;
                font-size: 17px;
            }
        }
    </style>
</head>
<body>

    <!-- LANDING PAGE -->
    <div id="landing">
        <div class="background-grid"></div>
        
        <div class="landing-content">
            <div class="card">
                
                <!-- Logo -->
                <div class="logo">
                    <div class="logo-dot"></div>
                    <div class="logo-text">PREEARN MODE ON </div>
                </div>
                
                <p class="tagline">Instant video meetings.<br>Zero setup. Powered by Jitsi.</p>

                <!-- Form -->
                <div class="form-group">
                    <label class="label">Your name</label>
                    <input type="text" id="username-input" placeholder="Aura" value="Aura" maxlength="30">
                </div>

                <div class="form-group">
                    <label class="label">Room name</label>
                    <div class="room-row">
                        <input type="text" id="room-input" placeholder="team-sync, project-x, happy-hour" maxlength="50">
                        <div class="generate-btn" id="generate-btn" title="Generate random room">🎲</div>
                    </div>
                </div>

                <!-- Join Button -->
                <button id="join-btn" class="join-btn">
                    <span>Join Meeting</span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                        <path d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                </button>

                <!-- Demo rooms -->
                <div class="demo-rooms">
                    <div class="demo-title">Or try one of these live rooms</div>
                    <div class="demo-badges" id="demo-badges">
                        <!-- Populated by JS -->
                    </div>
                </div>

                <div style="text-align:center; margin-top:28px; font-size:13px; color:#555;">
                    No account needed • End-to-end encrypted • Free forever
                </div>
            </div>
        </div>
    </div>

    <!-- MEETING PAGE -->
    <div id="meeting">
        
        <!-- Top Bar -->
        <div class="meeting-header">
            
            <!-- Left -->
            <div class="header-left">
                <div class="logo" style="margin:0; scale:0.75;">
                    <div class="logo-dot" style="width:18px;height:18px;"></div>
                    <div class="logo-text" style="font-size:22px;">AuraMeet</div>
                </div>
                <div class="meeting-dot"></div>
                <div class="room-title" id="room-title-display">Meeting Room</div>
            </div>

            <!-- Center -->
            <div class="header-center">
                <span id="participants-count" style="background:#22c55e;color:#000;padding:2px 9px;border-radius:9999px;font-size:12px;font-weight:700;">LIVE</span>
                <span id="meeting-time">00:00</span>
            </div>

            <!-- Right -->
            <div class="header-right">
                <button onclick="toggleFullscreen()" style="background:none;border:none;color:#aaa;font-size:20px;cursor:pointer;padding:8px;border-radius:50%;transition:0.2s;" title="Fullscreen">
                    ⛶
                </button>
                <button id="leave-btn" class="leave-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24">
                        <path d="M18 6L6 18M6 6l12 12"/>
                    </svg>
                    Leave
                </button>
            </div>
        </div>

        <!-- Jitsi Iframe Container -->
        <div class="iframe-wrapper">
            <iframe 
                id="jitsi-iframe"
                allow="camera; microphone; display-capture; screen-capture; fullscreen; autoplay; clipboard-write"
                allowfullscreen>
            </iframe>
            
            <!-- Floating back hint -->
            <div id="back-hint" onclick="leaveMeeting()" class="meeting-overlay" style="display:flex; cursor:pointer;">
                ← Back to lobby
            </div>
        </div>
    </div>

    <script>
        // DOM Elements
        const landingPage = document.getElementById('landing')
        const meetingPage = document.getElementById('meeting')
        const jitsiIframe = document.getElementById('jitsi-iframe')
        
        const usernameInput = document.getElementById('username-input')
        const roomInput = document.getElementById('room-input')
        const joinBtn = document.getElementById('join-btn')
        const generateBtn = document.getElementById('generate-btn')
        const leaveBtn = document.getElementById('leave-btn')
        const roomTitleDisplay = document.getElementById('room-title-display')
        
        let currentRoom = ''
        let timerInterval = null

        // Generate a random room name
        function generateRandomRoom() {
            const adjectives = ['cosmic','neon','quantum','echo','pulse','zenith','nova','lunar','spark','velocity']
            const nouns = ['hub','arena','lounge','forge','nest','core','vault','sphere','wave','summit']
            const randomAdj = adjectives[Math.floor(Math.random() * adjectives.length)]
            const randomNoun = nouns[Math.floor(Math.random() * nouns.length)]
            const randomNum = Math.floor(100 + Math.random() * 900)
            return `${randomAdj}-${randomNoun}-${randomNum}`
        }

        // Populate demo rooms
        function populateDemoRooms() {
            const container = document.getElementById('demo-badges')
            const examples = ['design-sync-874', 'weekly-sync', 'client-pitch', 'team-brainstorm', 'happy-friday']
            
            examples.forEach(room => {
                const badge = document.createElement('div')
                badge.className = 'demo-badge'
                badge.textContent = room
                badge.onclick = () => {
                    roomInput.value = room
                    // Trigger join with current username
                    usernameInput.value = usernameInput.value || 'Aura'
                    joinMeeting()
                }
                container.appendChild(badge)
            })
        }

        // Construct Jitsi URL with config
        function buildJitsiUrl(roomName, displayName) {
            const encodedRoom = encodeURIComponent(roomName.trim())
            const encodedName = encodeURIComponent(displayName.trim())
            
            // Config object passed via URL hash
            const configString = [
                `config.displayName=%22${encodedName}%22`,
                `config.prejoinPageEnabled=false`,
                `config.startWithAudioMuted=false`,
                `config.startWithVideoMuted=false`,
                `config.enableClosePage=false`,
                `config.disableDeepLinking=true`,
                `interfaceConfigOverwrite=%7B%22DEFAULT_REMOTE_DISPLAY_NAME%22%3A%22Participant%22%2C%22TOOLBAR_BUTTONS%22%3A%5B%22microphone%22%2C%22camera%22%2C%22desktop%22%2C%22chat%22%2C%22raisehand%22%2C%22participants-pane%22%2C%22tileview%22%2C%22fullscreen%22%2C%22hangup%22%5D%7D`
            ].join('&')
            
            return `https://meet.jit.si/${encodedRoom}#${configString}`
        }

        // Join the meeting
        function joinMeeting() {
            let room = roomInput.value.trim()
            
            // If no room entered → generate one instantly
            if (!room) {
                room = generateRandomRoom()
                roomInput.value = room
            }
            
            const username = usernameInput.value.trim() || 'Aura'
            currentRoom = room
            
            // Build and load Jitsi
            const jitsiUrl = buildJitsiUrl(room, username)
            jitsiIframe.src = jitsiUrl
            
            // Update UI
            roomTitleDisplay.textContent = room
            landingPage.style.opacity = '0'
            
            // Transition to meeting
            setTimeout(() => {
                landingPage.style.display = 'none'
                meetingPage.style.display = 'flex'
                meetingPage.classList.add('fade-in')
                
                // Start meeting timer
                startMeetingTimer()
                
                // Show floating hint after 4 seconds
                setTimeout(() => {
                    const hint = document.getElementById('back-hint')
                    if (hint) hint.style.display = 'flex'
                }, 4000)
            }, 420)
        }

        // Start elapsed time counter
        function startMeetingTimer() {
            let seconds = 0
            const timeEl = document.getElementById('meeting-time')
            
            if (timerInterval) clearInterval(timerInterval)
            
            timerInterval = setInterval(() => {
                seconds++
                const min = Math.floor(seconds / 60).toString().padStart(2, '0')
                const sec = (seconds % 60).toString().padStart(2, '0')
                timeEl.textContent = `${min}:${sec}`
            }, 1000)
        }

        // Leave meeting and return to lobby
        function leaveMeeting() {
            if (timerInterval) {
                clearInterval(timerInterval)
                timerInterval = null
            }
            
            // Unload iframe completely
            jitsiIframe.src = ''
            
            // Reset meeting page
            meetingPage.style.display = 'none'
            landingPage.style.display = 'flex'
            landingPage.style.opacity = '1'
            
            // Clear room field but keep username
            roomInput.value = ''
            currentRoom = ''
            
            // Reset demo badges in case user wants to rejoin
            console.log('%c✅ Returned to lobby. Ready for next meeting!', 'color:#ff2d55;font-weight:600')
        }

        // Toggle fullscreen on the entire document
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(() => {})
            } else {
                document.exitFullscreen()
            }
        }

        // Main initialization
        function initialize() {
            console.log('%c🚀 AuraMeet ready – single HTML file, full Jitsi integration', 'background:#ff2d55;color:#fff;padding:2px 6px;border-radius:3px;font-size:13px')
            
            // Generate button
            generateBtn.addEventListener('click', () => {
                const newRoom = generateRandomRoom()
                roomInput.value = newRoom
                // Optional micro animation
                roomInput.style.transitionDuration = '0ms'
                roomInput.style.transform = 'scale(0.95)'
                setTimeout(() => {
                    roomInput.style.transitionDuration = '200ms'
                    roomInput.style.transform = 'scale(1)'
                }, 1)
            })
            
            // Join button
            joinBtn.addEventListener('click', joinMeeting)
            
            // Allow pressing Enter in inputs
            const inputs = [usernameInput, roomInput]
            inputs.forEach(input => {
                input.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') joinMeeting()
                })
            })
            
            // Leave button
            leaveBtn.addEventListener('click', leaveMeeting)
            
            // Demo rooms
            populateDemoRooms()
            
            // Keyboard shortcut hint
            console.log('%cTip: Press "Escape" while in meeting to quickly return to lobby', 'color:#888;font-size:11px')
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && meetingPage.style.display === 'flex') {
                    leaveMeeting()
                }
            })
            
            console.log('✅ Complete single-file video meeting website loaded. Ready to deploy on GitHub Pages!')
        }
        
        // Boot the app
        window.onload = initialize
    </script>
</body>
</html>
